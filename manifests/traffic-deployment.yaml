apiVersion: apps/v1
kind: Deployment
metadata:
  name: tls-traffic
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tls-traffic
  template:
    metadata:
      labels:
        app: tls-traffic
    spec:
      containers:
        - name: curl
          image: curlimages/curl
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                curl -k https://bleater.devops.local >/dev/null 2>&1
                sleep 0.2
              done