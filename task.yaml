id: ingress-controller-tls-termination
title: Fix TLS Session Timeout in Ingress Controller
difficulty: hard

description: |
  The ingress controller is experiencing TLS session instability due to
  an invalid nginx configuration.

  The ConfigMap `ingress-nginx-config` currently sets:

      ssl-session-timeout: "0"

  This value is invalid and causes TLS sessions to terminate immediately.

  Your task is to fix the configuration WITHOUT recreating the Deployment.

environment:
  namespace: ingress-system
  deployment: ingress-controller
  configmap: ingress-nginx-config

objectives:
  - Update ssl-session-timeout to a valid non-zero nginx duration.

constraints:
  - Do NOT delete or recreate the Deployment.
  - Deployment UID must remain unchanged.
  - Container image must remain nginx:1.25.3.
  - Memory limit must remain 128Mi.

success_criteria:
  - Deployment becomes Ready.
  - nginx serves HTTP 200 responses.
  - Container restart count remains stable.

notes: |
  Valid nginx duration examples:
    10s, 5m, 1h, 1d