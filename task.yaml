id: ingress-tls-memory-leak

title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes

category: incident-response
difficulty: hard
horizon: short

description: |
  The cluster ingress controller is crashing every 4–6 hours.

  Investigation findings:

    • Pods are being OOMKilled
    • Memory usage steadily increases
    • TLS termination is enabled
    • TLS session reuse is heavily utilized
    • TLS sessions never expire

  The issue is caused by a misconfigured TLS session timeout
  in the ConfigMap:

      ingress-nginx-config

  The field `ssl-session-timeout` is incorrectly set to "0",
  preventing session expiration and causing unbounded memory growth.

requirements: |
  You MUST:

    • Correct the TLS session timeout configuration
    • Preserve the existing Deployment
    • Keep TLS enabled
    • Keep memory limit unchanged (128Mi)
    • Keep container image unchanged (nginx:1.25)

success_criteria:
  - Deployment UID remains unchanged
  - Memory limit remains exactly 128Mi
  - Container image remains nginx:1.25
  - ssl-session-timeout is corrected (non-zero valid duration)
  - Deployment becomes Ready
  - No new OOM restarts occur

constraints:
  - Do NOT delete or recreate the Deployment
  - Do NOT change the container image
  - Do NOT increase memory limits
  - Do NOT disable TLS
  - Do NOT modify grader.py

notes: |
  Valid ssl-session-timeout values follow nginx duration format,
  such as "10m" or "300s".

  