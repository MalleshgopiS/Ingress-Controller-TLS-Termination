id: ingress-controller-tls-termination-hardpp
title: Ingress Controller TLS Termination Fix (Hard++)
difficulty: hard
category: kubernetes

description: |
  A Deployment named ingress-controller exists in the default namespace.

  The nginx configuration is stored in ConfigMap:
    ingress-nginx-config

  The configuration file custom.conf contains:

      ssl_session_timeout 0m;

  This value is invalid and must be changed to a valid non-zero duration.

  Valid format:
      ^[1-9][0-9]*(s|m|h|d)$

  A Service named ingress-controller exposes the Deployment.

requirements:
  - Only modify ssl_session_timeout.
  - Do NOT delete or recreate the Deployment.
  - Deployment UID must remain unchanged.
  - Replicas must remain 3.
  - maxUnavailable must remain 0.
  - Memory must remain 128Mi.
  - Image must remain nginx:1.25.3.
  - Service must return HTTP 200.