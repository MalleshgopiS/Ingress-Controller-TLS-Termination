id: ingress-controller-tls-termination
title: Ingress Controller TLS Termination
difficulty: hard

prompt: |
  The ingress controller currently has ssl-session-timeout set to "0",
  which disables TLS session expiration.

  Update the ConfigMap named `ingress-nginx-config`
  in namespace `ingress-system`.

  Set `ssl-session-timeout` to a valid non-zero nginx duration
  (e.g., 10m, 1h, 30s).

  Constraints:
  - Do NOT delete or recreate the Deployment.
  - Preserve the Deployment UID.
  - Preserve container image (nginx:1.25.3).
  - Preserve memory limit (128Mi).

success_criteria:
  - Deployment remains ready
  - Nginx serves HTTP 200
  - Restart count remains stable