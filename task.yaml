id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
category: incident-response
difficulty: hard
horizon: short

description: |
  The ingress controller crashes every 4–6 hours.

  Investigation shows:
    - Pods terminated with OOMKilled
    - Memory steadily increases over time
    - TLS termination is enabled
    - TLS sessions never expire

  Root cause is a TLS session cache configuration leak.

  You must:

    • Fix the TLS session cache configuration
    • Stabilize the ingress controller
    • Preserve the existing Deployment
    • Keep TLS enabled
    • Do NOT increase memory limits

success_criteria:
  - Deployment UID unchanged
  - Memory limit remains 128Mi
  - TLS session timeout corrected
  - Pod becomes Ready
  - No new OOM restarts occur

constraints:
  - Do not delete Deployment
  - Do not change container image
  - Do not modify grader.py