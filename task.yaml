name: Ingress-Controller-TLS-Termination
author: apex
version: 1

description: >
  Fix a misconfigured nginx timeout value in a Kubernetes ConfigMap
  while preserving the running Deployment.

category: kubernetes
difficulty: medium

tags:
  - kubernetes
  - nginx
  - configmap
  - debugging

estimated_duration: 10
max_agent_steps: 25
timeout: 600

prompt: |
  A Kubernetes cluster is running an nginx Deployment named
  `ingress-controller` in the namespace `ingress-system`.

  The Deployment reads configuration from a ConfigMap named
  `ingress-nginx-config`.

  The ConfigMap currently contains an invalid value:

      ssl-session-timeout: "0"

  The value `"0"` is invalid for nginx and causes incorrect
  behavior.

  Your task is to update the ConfigMap so that the value becomes:

      ssl-session-timeout: "10m"

  Constraints:

  - You must NOT delete or recreate the Deployment.
  - The Deployment UID must remain unchanged.
  - The container image must remain `nginx:alpine`.
  - The container memory limit must remain `128Mi`.
  - The Deployment must remain running and ready.
  - nginx must continue serving HTTP requests successfully.

  You may update the existing ConfigMap and ensure the
  Deployment reloads the updated configuration.

instructions: |
  Investigate the ConfigMap named `ingress-nginx-config`
  in the namespace `ingress-system`.

  The key `ssl-session-timeout` currently contains the
  invalid value `"0"`.

  Update the ConfigMap so that:

      ssl-session-timeout = "10m"

  After updating the ConfigMap, ensure the nginx pod
  reloads the configuration while keeping the Deployment
  unchanged.

  The Deployment specification must remain exactly the same.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py