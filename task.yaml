name: ingress-tls-memory-leak
category: Incident Response & Troubleshooting
difficulty: hard
horizon: short

description: |
  The cluster ingress gateway is crashing periodically.

  Every 4–6 hours the ingress controller restarts unexpectedly.
  Services become temporarily unavailable during these crashes.

  Investigation notes:
  - Pods show OOMKilled events
  - Memory usage increases steadily over time
  - TLS termination is enabled on the ingress controller
  - TLS session reuse is heavily utilized in production traffic

  Your task:

  Identify and fix the root cause of the ingress controller memory leak
  without masking the issue.

  You MUST:
  - Fix the configuration causing the TLS session cache leak
  - Ensure ingress controller stabilizes
  - Preserve the existing Deployment (do NOT delete/recreate)
  - Do NOT increase memory limits as a workaround
  - Do NOT disable TLS

success_criteria:
  - Ingress pod is Running and Ready
  - No OOMKilled events remain
  - TLS session cache configuration is corrected
  - Memory limit unchanged from original
  - Deployment UID preserved

constraints:
  - Do not delete the Deployment
  - Do not scale to zero and recreate
  - Do not change container image
  - Do not modify grader artifacts