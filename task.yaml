id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
category: site-reliability-engineering
difficulty: hard
horizon: short

description: |
  The ingress-nginx controller periodically crashes due to
  unbounded TLS session cache growth causing memory exhaustion.

  External HTTPS requests intermittently fail.

  Diagnose and stabilize ingress without:
    - disabling TLS
    - scaling replicas
    - modifying grader assets

success_criteria:
  - ingress controller does not restart
  - HTTPS endpoint consistently returns 200
  - TLS remains enabled
  - memory leak mitigated
  - alert rule created