name: ingress-controller-configmap-fix
category: kubernetes
difficulty: medium

prompt: |
  The Kubernetes cluster contains an ingress controller running in the
  `ingress-system` namespace.

  A ConfigMap named `ingress-nginx-config` is incorrectly configured.
  The value of `ssl-session-timeout` is currently set to `"0"` which
  disables session expiration and causes issues with TLS session caching.

  Your task is to fix the configuration.

  Environment:

  • Namespace: ingress-system  
  • Deployment: ingress-controller  
  • ConfigMap: ingress-nginx-config  
  • Service: ingress-controller  

  Objectives:

  1. Update the ConfigMap `ingress-nginx-config` in namespace `ingress-system`.
  2. Set the key `ssl-session-timeout` to a **valid non-zero nginx duration**  
     (for example: `10s`, `5m`, `1h`, etc).

  Constraints:

  • The deployment **must NOT be deleted or recreated**.  
  • The **deployment UID must remain unchanged**.  
  • The container image **must remain `nginx:alpine`**.  
  • The container **memory limit must remain `128Mi`**.  
  • Only the ConfigMap configuration should be modified.

  Notes:

  • After modifying a ConfigMap used by a running pod, the pod may need to
    restart to reload the configuration.
  • Valid nginx duration examples:
      - 10s
      - 5m
      - 1h
      - 1d

  Success Criteria:

  • The ConfigMap contains a valid non-zero `ssl-session-timeout`.
  • The deployment remains ready with 1 running replica.
  • nginx continues to serve HTTP requests with status code **200**.
  • Container restart count stabilizes after the fix.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

tags:
  - kubernetes
  - configmap
  - debugging
  - devops