name: Ingress-Controller-TLS-Termination
slug: ingress-controller-tls-termination
category: Incident Response & Troubleshooting
difficulty: hard
horizon: short

description: |
  The ingress controller is experiencing periodic crashes due to a TLS
  session cache misconfiguration.

  The ConfigMap `ingress-nginx-config` contains:

      ssl-session-timeout: "0"

  A timeout value of "0" disables expiration of cached TLS sessions,
  causing unbounded memory growth and eventual container restarts.

  Your task is to fix the configuration WITHOUT deleting or recreating
  the Deployment.

environment:
  namespace: ingress-system
  deployment: ingress-controller
  configmap: ingress-nginx-config
  container_name: nginx
  container_image: nginx:1.25
  memory_limit: 128Mi

setup_behavior: |
  The environment is initialized automatically before the task begins.

  setup.sh performs the following actions:

  - Creates namespace `ingress-system`
  - Creates ConfigMap `ingress-nginx-config`
    with `ssl-session-timeout: "0"`
  - Creates Deployment `ingress-controller`
    running nginx:1.25 with memory limit 128Mi
  - Stores the original Deployment UID at:

        /grader/original_uid

    This UID is used by the grader to ensure the Deployment
    is NOT deleted or recreated during the solution.

objectives:
  - Update ConfigMap ingress-nginx-config
  - Set ssl-session-timeout to a valid non-zero nginx duration
  - Preserve Deployment UID
  - Ensure Deployment becomes Ready
  - Ensure nginx returns HTTP 200
  - Prevent restart count increase

constraints:
  - Do not delete Deployment
  - Do not recreate Deployment
  - Do not modify image version
  - Do not change memory limits

success_criteria:
  - Deployment UID unchanged
  - Memory limit remains 128Mi
  - Image remains nginx:1.25
  - ssl-session-timeout valid and non-zero
  - Deployment Ready
  - HTTP 200 response
  - Restart count stable

notes: |
  Valid nginx duration examples:

      10s
      5m
      1h
      2d
      1w

  Duration must match:

      ^[1-9][0-9]*(s|m|h|d|w|M|y)$