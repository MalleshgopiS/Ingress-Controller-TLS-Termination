id: ingress-controller-tls-termination-hardpp
title: Ingress Controller TLS Termination (Hard++)
difficulty: hard

description: |
  Namespace:
    ingress-system

  Existing Resources:
    - Deployment: ingress-controller
    - ConfigMap: ingress-nginx-config
    - Service: ingress-controller

  The Deployment:
    - Replicas: 3
    - RollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    - Image: nginx:1.25.3
    - Memory limit: 128Mi

  The ConfigMap contains an nginx.conf file structured like:

      events {}

      http {
        server {
          listen 80;

          ssl_session_timeout 0m;

          location / {
            return 200 "OK\n";
          }
        }
      }

  Problem:
    The ssl_session_timeout value is invalid per policy.
    It is currently set to a zero duration (0m).

  You must change ONLY the ssl_session_timeout value
  to a valid non-zero nginx duration.

  Valid formats include:
      10m
      30s
      1h
      2d

  Valid format regex:
      ^[1-9][0-9]*(s|m|h|d)$

  Constraints:
    - Do NOT delete or recreate the Deployment
    - Replicas must remain 3
    - Do NOT scale replicas
    - Do NOT modify image (nginx:1.25.3)
    - Do NOT modify memory limit (128Mi)
    - Do NOT change RollingUpdate strategy
    - Do NOT cause downtime
    - Do NOT overwrite the entire nginx configuration
    - Only update the ssl_session_timeout value

success_criteria:
  - Deployment UID unchanged
  - 3 replicas Ready
  - RollingUpdate maxUnavailable remains 0
  - HTTP 200 served from Service
  - nginx.conf structure preserved (events/http/server/listen/location)
  - Valid timeout format applied