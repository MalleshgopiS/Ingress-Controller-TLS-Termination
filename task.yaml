id: ingress-tls-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes

difficulty: hard
category: Incident Response & Troubleshooting
horizon: short

description: |
  The Kubernetes ingress controller is experiencing periodic instability
  caused by a TLS session cache misconfiguration.

  Environment Details:

    Namespace:
      ingress-system

    Deployment:
      ingress-controller

    ConfigMap:
      ingress-nginx-config

  Investigation Findings:

    The ConfigMap key `ssl-session-timeout` is currently set to "0".
    This disables TLS session expiration and allows unbounded TLS
    session accumulation, eventually exhausting container memory.

  Observed Symptoms:

    - Memory usage steadily increases
    - Pods restart intermittently
    - Gateway instability occurs over time

  The cluster environment and broken configuration are already
  initialized when the task begins.

  Your objective is to correct the configuration safely without
  recreating or replacing existing resources.

requirements:
  - Update the ConfigMap `ingress-nginx-config`
  - Set `ssl-session-timeout` to a valid non-zero nginx duration
  - Preserve the existing Deployment object
  - Keep memory limit exactly 128Mi
  - Keep container image exactly nginx:1.25
  - Ensure the deployment becomes Ready
  - Ensure nginx serves HTTP 200 inside the running pod
  - Ensure container restart count does not increase after stabilization

constraints:
  - Do NOT delete and recreate the Deployment
  - Do NOT modify resource limits
  - Do NOT change container image
  - Do NOT disable TLS
  - Do NOT create additional deployments

success_criteria:
  - Deployment UID remains unchanged
  - Memory limit remains exactly 128Mi
  - Container image remains nginx:1.25
  - ssl-session-timeout is a valid non-zero nginx duration
  - Deployment reports at least one Ready replica
  - nginx returns HTTP 200 when accessed locally inside the pod
  - Container restart count remains stable during validation window

notes: |
  Valid nginx duration examples include:

    10m
    300s
    1h
    2d
    1w

  Duration must be a positive integer followed by a supported nginx
  time unit:

    s (seconds)
    m (minutes)
    h (hours)
    d (days)
    w (weeks)
    M (months)
    y (years)

  The initial environment and broken configuration are automatically
  prepared before the task starts.