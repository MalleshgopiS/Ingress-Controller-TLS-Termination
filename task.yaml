id: ingress-controller-tls-termination

title: Fix TLS Session Timeout Misconfiguration in Ingress Controller

difficulty: hard

description: |
  A Kubernetes ingress controller is experiencing instability due to an
  incorrect TLS session cache configuration.

  The ConfigMap `ingress-nginx-config` contains:

      ssl-session-timeout: "0"

  A timeout value of "0" disables session expiration and causes
  unbounded TLS session growth.

  Fix the configuration safely without disrupting the Deployment.

environment:
  namespace: ingress-system
  deployment: ingress-controller
  configmap: ingress-nginx-config
  container_image: nginx:1.25.3

objectives:
  - Update the ConfigMap.
  - Set ssl-session-timeout to a valid non-zero nginx duration.
  - Ensure nginx reloads configuration.

constraints:
  - Do NOT delete or recreate the Deployment.
  - Deployment UID must remain unchanged.
  - Container image must remain nginx:1.25.3.
  - Memory limit must remain 128Mi.

success_criteria:
  - Deployment becomes Ready.
  - nginx serves HTTP 200.
  - Restart count remains stable.
  - ssl-session-timeout is valid.
  - Deployment UID unchanged.
  - Image unchanged.
  - Memory unchanged.

notes: |
  Valid nginx durations:

      10s
      5m
      1h
      1d

  Updating a ConfigMap may require Pod recreation for nginx reload.

  The environment runs offline with pre-cached container images.