# ============================================================
# task.yaml
# Ingress Controller TLS Session Timeout Fix
# ============================================================

name: Ingress-Controller-TLS-Termination
difficulty: medium

description: |
  A Kubernetes Deployment named `ingress-controller`
  is running in the `default` namespace.

  It uses a ConfigMap `ingress-nginx-config`
  that contains an invalid value:

      ssl-session-timeout: "0"

  This must be corrected.

instructions: |
  Update the ConfigMap so that:

  - ssl-session-timeout is a valid non-zero nginx duration
    (e.g., 10m, 1h, 30s).

  You must:

  - NOT delete or recreate the Deployment.
  - Preserve Deployment UID.
  - Preserve image: nginx:1.25.3.
  - Preserve memory limit: 128Mi.
  - Ensure Deployment remains Available.
  - Ensure Service returns HTTP 200.

success_criteria:
  - Valid non-zero nginx duration.
  - Deployment UID unchanged.
  - Image unchanged.
  - Memory unchanged.
  - Deployment Available.
  - HTTP 200 returned.