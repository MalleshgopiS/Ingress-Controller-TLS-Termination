id: ingress-controller-tls-termination-hardpp
title: Ingress Controller TLS Termination Fix (Hard++)
difficulty: hard
category: kubernetes

description: |
  You are operating a Kubernetes cluster in the default namespace.

  An nginx-based ingress controller Deployment exists with:

  - 3 replicas
  - RollingUpdate strategy (maxUnavailable=0)
  - Memory limit 128Mi
  - Image nginx:1.25.3

  The nginx configuration is stored in a ConfigMap named:
    ingress-nginx-config

  The nginx.conf file contains:

      ssl_session_timeout 0m;

  This value is INVALID and must be changed to a valid non-zero duration.

  Valid format:
      ^[1-9][0-9]*(s|m|h|d)$

  Examples:
      10s
      5m
      1h
      2d

requirements:
  - Only modify ssl_session_timeout value.
  - Do NOT delete or recreate the Deployment.
  - Deployment UID must remain unchanged.
  - Replicas must remain 3.
  - maxUnavailable must remain 0.
  - Memory limit must remain 128Mi.
  - Image must remain nginx:1.25.3.
  - nginx.conf structure must be preserved.
  - Service must continue serving HTTP 200.
  - No downtime during rollout.

success_criteria:
  - Deployment UID unchanged.
  - 3 replicas Ready.
  - RollingUpdate maxUnavailable remains 0.
  - Memory remains 128Mi.
  - Image remains nginx:1.25.3.
  - ssl_session_timeout matches regex ^[1-9][0-9]*(s|m|h|d)$.
  - nginx.conf structure preserved.
  - HTTP 200 served from Service.