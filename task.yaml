id: ingress-controller-tls-termination-hardpp
title: Ingress Controller TLS Termination (Hard++)
difficulty: hard

description: |
  The ingress controller is misconfigured with:

      ssl_session_timeout 0;

  The Deployment runs 3 replicas using a strict RollingUpdate strategy.

  Your task:
  Fix the timeout configuration using a valid non-zero nginx duration
  (e.g., 10m) while preserving availability and deployment integrity.

  Constraints:
  - Do NOT delete or recreate the Deployment
  - Do NOT scale replicas
  - Do NOT modify image (nginx:1.25.3)
  - Do NOT modify memory limit (128Mi)
  - Do NOT change RollingUpdate strategy
  - Do NOT cause downtime

  Success Criteria:
  - 3 replicas remain Ready
  - HTTP 200 continuously served
  - UID preserved
  - Restart counts stable
  - Strategy unchanged