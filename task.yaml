id: ingress-controller-tls-termination-memory-leak
title: Ingress Controller TLS Termination Memory Leak Causing Periodic Gateway Crashes
category: Incident Response & Troubleshooting
difficulty: hard
horizon: short

description: |
  The ingress controller is experiencing periodic restarts every 4–6 hours.
  Investigation shows that TLS session caching is misconfigured, causing
  unbounded memory growth.

  The ConfigMap `ingress-nginx-config` contains:

      ssl-session-timeout: "0"

  A value of "0" disables session expiration, allowing stale TLS sessions
  to accumulate indefinitely. This eventually leads to memory exhaustion
  and container restarts.

  Your task is to correct the configuration without disrupting the existing
  Deployment object.

environment:
  namespace: default
  deployment: ingress-controller
  configmap: ingress-nginx-config
  container_image: nginx:1.25
  memory_limit: 128Mi

requirements:
  - Update the ConfigMap `ingress-nginx-config`
  - Set `ssl-session-timeout` to a valid non-zero nginx duration
  - Do NOT delete or recreate the Deployment
  - Preserve the existing memory limit (128Mi)
  - Preserve the existing container image (nginx:1.25)
  - Ensure the Deployment becomes Ready
  - Ensure nginx serves HTTP 200
  - Ensure container restart count remains stable

constraints:
  - You must modify the existing resources in place
  - You may not delete and recreate the Deployment
  - You may not change resource limits or container image
  - The timeout must match nginx duration format

notes: |
  Valid nginx duration formats include:

      30s
      5m
      1h
      1d
      1w

  Duration format must match:

      ^[1-9][0-9]*(s|m|h|d|w|M|y)$

success_criteria:
  - Deployment UID remains unchanged
  - Memory limit is exactly 128Mi
  - Container image is exactly nginx:1.25
  - ssl-session-timeout is valid and non-zero
  - Deployment status is Ready
  - nginx returns HTTP 200
  - Container restart count does not increase