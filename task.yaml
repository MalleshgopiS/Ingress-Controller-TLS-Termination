name: ingress-nginx-config-fix
author: apex
version: 1

description: >
  Fix the nginx keepalive timeout configuration stored in a ConfigMap
  without modifying the Deployment specification.

category: kubernetes
difficulty: medium

tags:
  - kubernetes
  - nginx
  - configmap
  - debugging

estimated_duration: 10
max_agent_steps: 25
timeout: 600

prompt: |
  A Kubernetes cluster is running an nginx deployment in the namespace
  `ingress-system`.

  The nginx configuration is controlled by a ConfigMap named
  `ingress-nginx-config`.

  Currently the keepalive timeout value inside the ConfigMap is invalid,
  causing nginx to behave incorrectly.

  Your task is to fix the configuration so nginx runs with a valid
  keepalive timeout.

  Constraints:
  - Do NOT modify the Deployment spec.
  - Do NOT change the container image.
  - Do NOT modify memory limits.
  - Only update the ConfigMap configuration.
  - Ensure nginx returns HTTP 200 after the fix.

instructions: |
  Investigate the ConfigMap controlling nginx configuration.

  Identify the incorrect keepalive timeout value and update it to a
  valid value.

  After updating the ConfigMap, ensure the nginx pod reloads the new
  configuration.

  The deployment configuration must remain unchanged.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py