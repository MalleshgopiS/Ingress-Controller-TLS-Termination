name: ingress-controller-configmap-fix
category: kubernetes
difficulty: medium

prompt: |
  The Kubernetes cluster contains an ingress controller running in the
  `ingress-system` namespace.

  A ConfigMap named `ingress-nginx-config` is incorrectly configured.
  The value of `ssl-session-timeout` is set to `"0"` which breaks
  expected behavior.

  Your task is to fix the configuration so that:

  1. The ConfigMap `ingress-nginx-config` in namespace `ingress-system`
     has `ssl-session-timeout` set to `"10m"`.

  2. The existing deployment `ingress-controller` must remain running.

  3. You must NOT delete or recreate the deployment.

  4. Only update the existing ConfigMap.

  5. The deployment UID must remain unchanged.

  After fixing the ConfigMap, the cluster should continue operating
  normally and the ingress controller should remain available.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

tags:
  - kubernetes
  - configmap
  - debugging
  - devops